<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4a7c59">
  <title>幼稚園文件月曆</title>
  <link rel="manifest" href="/static/manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v={{APP_VERSION}}">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📅</span>
        <div>
          <h1>幼稚園文件月曆</h1>
          <p class="subtitle">上傳通告、活動單、假期表 — AI 自動整理成月曆</p>
        </div>
      </div>
      <div class="header-actions">
        <div id="status-badge" class="status-badge">檢查中...</div>
        <div id="user-menu" class="user-menu hidden">
          <img id="user-avatar" class="user-avatar" alt="">
          <span id="user-name" class="user-name"></span>
          <a href="/auth/logout" class="btn btn-ghost">登出</a>
        </div>
      </div>
    </div>
  </header>

  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-icon">📅</div>
      <h2>幼稚園文件月曆</h2>
      <p>用 Google 帳戶登入，管理你嘅幼稚園通告同活動</p>
      <a href="/auth/login" class="btn btn-google">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        用 Google 帳戶登入
      </a>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>

  <main id="app-main" class="main hidden">
    <nav class="mobile-tabs" aria-label="主要功能">
      <button type="button" class="tab-btn active" data-tab="upload">上傳</button>
      <button type="button" class="tab-btn" data-tab="calendar">月曆</button>
      <button type="button" class="tab-btn" data-tab="events">活動</button>
      <button type="button" class="tab-btn" data-tab="docs">文件</button>
    </nav>

    <section class="upload-section tab-panel active" data-panel="upload">
      <div id="drop-zone" class="drop-zone">
        <div class="drop-icon">📄</div>
        <p class="drop-title">拖放文件到這裡，或點擊選擇</p>
        <p class="drop-hint">支援 JPG、PNG、PDF、DOCX</p>
        <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.webp,.pdf,.docx" hidden>
        <button type="button" id="select-btn" class="btn btn-primary">選擇文件</button>
      </div>
      <div id="upload-progress" class="upload-progress hidden">
        <div class="spinner"></div>
        <p>AI 正在分析文件，請稍候...</p>
      </div>
      <div id="review-panel" class="review-panel hidden">
        <div class="review-header">
          <p class="review-label">審核提取的活動</p>
          <h3 id="review-filename"></h3>
          <p id="review-summary" class="review-summary"></p>
          <p id="review-progress" class="review-progress"></p>
        </div>
        <div id="review-view">
          <div id="review-event-title" class="review-event-title"></div>
          <div id="review-event-body" class="review-event-body"></div>
        </div>
        <form id="review-form" class="review-form hidden">
          <div class="form-field">
            <label for="review-title">標題</label>
            <input type="text" id="review-title" required maxlength="200" placeholder="活動名稱">
          </div>
          <div class="form-field">
            <label for="review-category">類別</label>
            <select id="review-category">
              <option value="holiday">假期</option>
              <option value="activity">活動</option>
              <option value="payment">繳費</option>
              <option value="uniform">校服</option>
              <option value="meeting">會議</option>
              <option value="excursion">外出</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="review-date">開始日期</label>
              <input type="date" id="review-date" required>
            </div>
            <div class="form-field">
              <label for="review-end-date">結束日期</label>
              <input type="date" id="review-end-date">
            </div>
          </div>
          <div class="form-field">
            <label for="review-time">時間（留空 = 全日）</label>
            <input type="time" id="review-time">
          </div>
          <div class="form-field">
            <label for="review-location">地點</label>
            <input type="text" id="review-location" maxlength="200">
          </div>
          <div class="form-field">
            <label for="review-description">說明</label>
            <textarea id="review-description" rows="2" maxlength="500"></textarea>
          </div>
          <div class="form-field">
            <label for="review-notes">注意事項</label>
            <textarea id="review-notes" rows="2" maxlength="500"></textarea>
          </div>
        </form>
        <div class="review-actions">
          <button type="button" id="review-edit-btn" class="btn btn-secondary">編輯</button>
          <button type="button" id="review-confirm-btn" class="btn btn-primary">加入月曆</button>
          <button type="button" id="review-skip-btn" class="btn btn-ghost">略過</button>
        </div>
        <button type="button" id="review-cancel-btn" class="btn btn-ghost review-cancel">取消審核</button>
      </div>
      <div id="upload-results" class="upload-results"></div>
    </section>

    <section class="calendar-section tab-panel" data-panel="calendar">
      <div class="section-header">
        <h2>活動月曆</h2>
        <div class="calendar-header-actions">
          <button type="button" id="add-event-btn" class="btn btn-primary btn-sm">+ 新增活動</button>
          <button type="button" id="legend-toggle" class="legend-toggle" aria-expanded="false">圖例</button>
        </div>
      </div>
      <div id="legend" class="legend collapsed">
        <span class="legend-item" data-color="#e74c3c">假期</span>
        <span class="legend-item" data-color="#3498db">活動</span>
        <span class="legend-item" data-color="#f39c12">繳費</span>
        <span class="legend-item" data-color="#9b59b6">校服</span>
        <span class="legend-item" data-color="#1abc9c">會議</span>
        <span class="legend-item" data-color="#27ae60">外出</span>
      </div>
      <div id="calendar"></div>
    </section>

    <section class="events-section tab-panel" data-panel="events">
      <div class="section-header">
        <h2>活動列表</h2>
        <span id="events-count" class="docs-count">0 個</span>
      </div>
      <div class="events-subsection">
        <h3 class="events-subtitle">即將舉行 <span id="upcoming-count" class="events-subcount"></span></h3>
        <div id="upcoming-list" class="events-list">
          <p class="empty-state">暫無即將舉行的活動</p>
        </div>
      </div>
      <div class="events-subsection">
        <h3 class="events-subtitle">已結束 <span id="past-count" class="events-subcount"></span></h3>
        <div id="past-list" class="events-list">
          <p class="empty-state">暫無已結束的活動</p>
        </div>
      </div>
    </section>

    <section class="docs-section tab-panel" data-panel="docs">
      <div class="section-header">
        <h2>已上傳文件</h2>
        <span id="docs-count" class="docs-count">0 份</span>
      </div>
      <div id="docs-list" class="docs-list">
        <p class="empty-state">尚未上傳任何文件</p>
      </div>
    </section>
  </main>

  <div id="event-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="關閉">&times;</button>
      <h3 id="modal-title"></h3>

      <div id="modal-view">
        <div id="modal-body" class="modal-body"></div>
        <div class="modal-actions modal-actions-row">
          <button type="button" id="modal-edit" class="btn btn-secondary">編輯</button>
          <button type="button" id="modal-delete" class="btn btn-danger">刪除</button>
        </div>
      </div>

      <form id="modal-form" class="modal-form hidden">
        <div class="form-field">
          <label for="form-title">標題</label>
          <input type="text" id="form-title" required maxlength="200" placeholder="活動名稱">
        </div>
        <div class="form-field">
          <label for="form-category">類別</label>
          <select id="form-category">
            <option value="holiday">假期</option>
            <option value="activity">活動</option>
            <option value="payment">繳費</option>
            <option value="uniform">校服</option>
            <option value="meeting">會議</option>
            <option value="excursion">外出</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for="form-date">開始日期</label>
            <input type="date" id="form-date" required>
          </div>
          <div class="form-field">
            <label for="form-end-date">結束日期</label>
            <input type="date" id="form-end-date">
          </div>
        </div>
        <div class="form-field">
          <label for="form-time">時間（留空 = 全日）</label>
          <input type="time" id="form-time">
        </div>
        <div class="form-field">
          <label for="form-location">地點</label>
          <input type="text" id="form-location" maxlength="200">
        </div>
        <div class="form-field">
          <label for="form-description">說明</label>
          <textarea id="form-description" rows="2" maxlength="500"></textarea>
        </div>
        <div class="form-field">
          <label for="form-notes">注意事項</label>
          <textarea id="form-notes" rows="2" maxlength="500"></textarea>
        </div>
        <div class="modal-actions modal-actions-row">
          <button type="button" id="modal-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" id="modal-save" class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="/static/js/storage.js?v={{APP_VERSION}}"></script>
  <script src="/static/js/app.js?v={{APP_VERSION}}"></script>
</body>
</html>
